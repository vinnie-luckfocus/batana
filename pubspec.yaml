name: batana
description: 棒球挥棒动作分析系统 - MVP 阶段
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.11.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  go_router: ^13.0.0
  google_mlkit_pose_detection: ^0.12.0
  font_awesome_flutter: ^10.7.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  animations: ^2.0.11
  flutter_neumorphic: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
